name: Bug Report
description: Report a bug or unexpected behaviour.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `cicada --doctor`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, PowerShell version, Python version, Copilot CLI version.
      placeholder: |
        OS: Windows 11
        PowerShell: 7.5
        Python: 3.12
        Copilot CLI: 1.0.22
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any error output or screenshots here.
    validations:
      required: false
